    <script> 
    document.getElementById('secondsection').style.display='none';
    var firstno = [];
    var finalno= [];
    var results = [];
	  for(var i=0; i < 99; i++) {
	  firstno[i] = (Math.floor(Math.random() * 99)+1);
    }
    finalno = firstno.filter(function(item,i,ar) {return ar.indexOf(item) ===i;});
    var totnum = finalno.length;
    var ele1 = 0;
    var quotient = 0;
    var factors = [];
    var all_arrays = [];
    var count1 = 1;
    var item1 = 0;
function myChange() {
    document.getElementById('Sbutton').value= "Next";
    document.getElementById('counting').innerHTML = count1;
    count1 = count1 + 1;
    if(count1 == 21) {
    document.getElementById('Sbutton').disabled = true;
    document.getElementById('Sbutton').value = "Bye";
    document.getElementById('Abutton').value = "Get all answers";
    }
    }
function myFactor() {
    for(var j=1; j < 99; j++) {
    quotient = finalno[ele1]/j;
    if(quotient == Math.floor(quotient)){
    factors.push(j); 
    }
    document.getElementById('randnum').innerHTML = finalno[ele1];
    if(factors.length==2) {
    document.getElementById('answer').innerHTML = 'Yes, it is the prime number';
    } else {
    document.getElementById('answer').innerHTML = finalno[ele1] + ': ' +factors;
    }
    }
    all_arrays[item1] = factors;
    factors = [];
    ele1 = ele1 + 1;
    item1 = item1 + 1;
    }
    
function myShow() {
    if(document.getElementById('arow4').style.display == 'none')
    {
    document.getElementById('arow4').style.display='';
    }
    if(document.getElementById('Abutton').value == "Get all answers") {
    
    document.getElementById('secondsection').style.display='';
    document.getElementById('firstsection').style.display='none';
    for(var d = 0; d < 20; d++) {
    if(all_arrays[d].length == 2){
    all_arrays[d] = "Prime Number";
    }
    }
    }
    document.getElementById('a1').innerHTML = finalno[0] + ':' + all_arrays[0];
    document.getElementById('a2').innerHTML = finalno[1] + ':' + all_arrays[1];
    document.getElementById('a3').innerHTML = finalno[2] + ':' + all_arrays[2];
    document.getElementById('a4').innerHTML = finalno[3] + ':' + all_arrays[3];
